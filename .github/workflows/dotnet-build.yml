name: dotnet-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Build UnrealAgent frontend
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore UnrealAgent.Server/UnrealAgent.Frontend/UnrealAgent.Frontend.csproj

      - name: Build
        run: dotnet build -c Release --no-restore UnrealAgent.Server/UnrealAgent.Frontend/UnrealAgent.Frontend.csproj
